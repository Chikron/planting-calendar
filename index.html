<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planting Calendar by ZIP Code</title>

<style>
:root {
  --bg:#0b1020;
  --panel:#121933;
  --text:#eef3ff;
  --muted:#aeb9d6;
  --accent:#7dd3fc;
  --danger:#fca5a5;
}

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(#0a1021,#0b1020);
  color:var(--text);
}

.wrap {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.hero {
  background:#121933;
  padding:20px;
  border-radius:16px;
}

h1 { margin:0 0 10px; }

.sub { color:var(--muted); }

.toolbar {
  display:flex;
  gap:10px;
  margin-top:15px;
}

input, select {
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  background:var(--accent);
  border:none;
  padding:10px 20px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.status {
  margin-top:10px;
  color:var(--muted);
}

.panel {
  margin-top:20px;
  background:#121933;
  padding:15px;
  border-radius:12px;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td, th {
  padding:10px;
  border-bottom:1px solid #2a3766;
}

.hidden { display:none; }
</style>
</head>

<body>
<div class="wrap">

<div class="hero">
<h1>Interactive Planting Calendar</h1>
<p class="sub">Enter any ZIP code to generate planting dates.</p>

<div class="toolbar">
<input id="zip" placeholder="63123" maxlength="5">
<select id="risk">
<option>Standard</option>
</select>
<button id="go">Build Calendar</button>
</div>

<div id="status" class="status">Ready</div>
</div>

<div id="results" class="hidden">

<div class="panel" id="facts"></div>

<div class="panel">
<table>
<thead>
<tr>
<th>Crop</th>
<th>Start Indoors</th>
<th>Plant Outside</th>
</tr>
</thead>
<tbody id="calendarBody"></tbody>
</table>
</div>

</div>
</div>

<script>
const zipInput = document.getElementById('zip');
const goBtn = document.getElementById('go');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');
const factsEl = document.getElementById('facts');
const calendarBody = document.getElementById('calendarBody');

function validZip(z) {
  return /^\d{5}$/.test(z);
}

function fmt(d) {
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}

function shift(d,weeks,before=true) {
  let x=new Date(d);
  x.setDate(x.getDate()+(weeks*7*(before?-1:1)));
  return x;
}

function estimate(zip) {
  let first=Number(zip[0]);
  let frost=new Date(new Date().getFullYear(),3,15);
  let zone="Unknown";

  if(first===9){zone="9–10"; frost=new Date(new Date().getFullYear(),1,20);}
  else if(first===8){zone="5–7"; frost=new Date(new Date().getFullYear(),4,20);}
  else if(first===7){zone="6–8"; frost=new Date(new Date().getFullYear(),3,25);}
  else if(first===6){zone="5–7"; frost=new Date(new Date().getFullYear(),3,15);}
  else if(first===5){zone="4–6"; frost=new Date(new Date().getFullYear(),4,5);}
  else {zone="3–5"; frost=new Date(new Date().getFullYear(),4,15);}

  return {zone,frost};
}

const crops=[
["Tomato",[8,6],[1,2]],
["Pepper",[10,8],[2,3]],
["Broccoli",[6,4],[-2,-1]],
["Lettuce",null,[-4,-2]],
["Spinach",null,[-6,-4]],
["Carrot",null,[-4,-2]],
["Radish",null,[-6,-4]],
["Cucumber",[4,3],[1,2]],
["Zucchini",[3,2],[1,1]],
["Beans",null,[1,2]]
];

function build(zip){
  let data=estimate(zip);

  factsEl.innerHTML=`
  <b>ZIP:</b> ${zip}<br>
  <b>Zone:</b> ${data.zone}<br>
  <b>Last Frost:</b> ${fmt(data.frost)}
  `;

  calendarBody.innerHTML="";

  crops.forEach(c=>{
    let indoor="Direct sow";
    if(c[1]){
      indoor=`${fmt(shift(data.frost,c[1][0]))} - ${fmt(shift(data.frost,c[1][1]))}`;
    }

    let out;
    if(c[2][0]<0){
      out=`${fmt(shift(data.frost,Math.abs(c[2][0])))} - ${fmt(shift(data.frost,Math.abs(c[2][1])))}`
    } else {
      out=`${fmt(shift(data.frost,c[2][0],false))} - ${fmt(shift(data.frost,c[2][1],false))}`
    }

    calendarBody.innerHTML+=`
    <tr>
    <td>${c[0]}</td>
    <td>${indoor}</td>
    <td>${out}</td>
    </tr>`;
  });

  resultsEl.classList.remove('hidden');
}

goBtn.onclick=()=>{
  let zip=zipInput.value;
  if(!validZip(zip)){
    statusEl.textContent="Enter valid ZIP";
    statusEl.style.color="var(--danger)";
    return;
  }

  statusEl.textContent="Building...";
  build(zip);
  statusEl.textContent="Done";
};

zipInput.value="63123";
</script>

</body>
</html>
